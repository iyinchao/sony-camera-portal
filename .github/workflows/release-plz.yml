name: release-plz

# release-plz drives releases from conventional commits:
#   - `release-pr` keeps an open PR that bumps the version + updates CHANGELOG.md
#   - merging that PR lands the bump on main; `release` then tags it + cuts the
#     GitHub Release, which gates the cross-platform binary build below.
# (A tag pushed with the default GITHUB_TOKEN does NOT trigger other workflows,
#  so the build lives here, gated on release-plz's `releases_created` output.)
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release:
    name: release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      releases: ${{ steps.release-plz.outputs.releases }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-pr:
    name: release-plz release-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Don't cancel an in-flight PR update; let each push reconcile the PR.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Cross-compile every non-macOS target and attach to the freshly cut release.
  build-cross:
    name: build (ish / android / linux / windows)
    needs: release
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: echo "tag=$(jq -r '.[] | select(.package_name=="sony-camera-portal") | .tag' <<< "$RELEASES")" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Zig
        # Stable tarballs use `zig-x86_64-linux-<ver>`; grab it from ziglang.org.
        run: |
          ZIG_VER=0.16.0
          mkdir -p "$HOME/zig"
          curl -fsSL "https://ziglang.org/download/${ZIG_VER}/zig-x86_64-linux-${ZIG_VER}.tar.xz" \
            | tar -xJ -C "$HOME/zig" --strip-components=1
          echo "$HOME/zig" >> "$GITHUB_PATH"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Build all cross targets
        run: ./scripts/build.sh ish android android32 linux linux-arm windows
      - name: Upload binaries to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" dist/* --clobber

  build-macos:
    name: build (macos)
    needs: release
    if: ${{ needs.release.outputs.releases_created == 'true' }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        env:
          RELEASES: ${{ needs.release.outputs.releases }}
        run: echo "tag=$(jq -r '.[] | select(.package_name=="sony-camera-portal") | .tag' <<< "$RELEASES")" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build macOS (host arch)
        run: ./scripts/build.sh macos
      - name: Upload binaries to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" dist/* --clobber
