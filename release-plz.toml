# release-plz: conventional-commit driven version bump + CHANGELOG + git tag +
# GitHub Release. This is an app, not a crate — we never publish to crates.io.
#
# Publishing is disabled the Cargo-native way: every crate sets `publish = false`
# in its Cargo.toml, so `cargo publish`/`cargo package` skip them entirely (a
# `git_only` switch here does NOT stop publish, and packaging the path-only
# inter-crate deps would fail). release-plz then derives the version from git
# tags, still bumps the shared version, writes CHANGELOG.md, tags + GitHub-releases.

[workspace]
# Must match every crate's Cargo.toml `publish = false` — release-plz errors on a
# mismatch. Version comes from git tags (git_tag_name below), not the registry.
publish = false
git_release_enable = true   # default; stated for intent — create a GitHub Release for the tag
git_tag_enable = true       # default; stated for intent — create the git tag
# CHANGELOG.md is generated by default (changelog_update = true).

# The application crate is the single source of the public version: it owns the
# `vX.Y.Z` tag + Release. The two libs ride the same version (version_group) but
# emit no tag/release of their own — otherwise a multi-crate workspace would
# default to `{{package}}-v{{version}}` tags and create three of them.
[[package]]
name = "sony-camera-portal"
version_group = "app"
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

[[package]]
name = "server"
version_group = "app"
git_tag_enable = false
git_release_enable = false

[[package]]
name = "camera"
version_group = "app"
git_tag_enable = false
git_release_enable = false
