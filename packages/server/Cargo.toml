[package]
name = "server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Localhost HTTP server: serves the embedded UI and proxies /api to the camera"

[features]
# Mock photo sources for UI dev (synthetic / a directory of images). On by
# default for dev & tests; build with --no-default-features to strip it from a
# release binary.
default = ["mock"]
mock = []

[dependencies]
camera = { path = "../camera" }
tiny_http = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
